name: Build Kikitan Translator

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dotnet

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-good1.0-dev \
            libnotify-dev \
            libsoup-3.0-dev \
            libsecret-1-dev \
            at-spi2-core \
            libfuse2 \
            squashfs-tools \
            pipewire

      - name: Install npm dependencies
        working-directory: KikitanTranslator.Photino/UserInterface
        run: npm i

      - name: Install velopack (vpk)
        run: |
          export DOTNET_CLI_TELEMETRY_OPTOUT=1
          mkdir -p "$HOME/.dotnet/tools"
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Build Linux release
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
        run: |
          dotnet build -c Release -r linux-x64 KikitanTranslator.Photino/

      - name: Copy AppImage
        run: |
          RELEASE_DIR="KikitanTranslator.Photino/bin/Release/net9.0/linux-x64/Release"
          chmod +x "$RELEASE_DIR/com.github.yusufozmen01.kikitan-translator.AppImage"
          cp "$RELEASE_DIR/com.github.yusufozmen01.kikitan-translator.AppImage" kikitan-translator.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kikitan-translator-linux-AppImage
          path: kikitan-translator.AppImage
          if-no-files-found: error

      - name: Upload Linux release files (for combined zip)
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-files
          path: KikitanTranslator.Photino/bin/Release/net9.0/linux-x64/Release/
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dotnet

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install npm dependencies
        working-directory: KikitanTranslator.Photino/UserInterface
        run: npm i

      - name: Install velopack (vpk)
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
        run: |
          dotnet tool install -g vpk
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows release
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
        run: |
          dotnet build -c Release -r win-x64 KikitanTranslator.Photino/

      - name: Upload Setup.exe
        uses: actions/upload-artifact@v4
        with:
          name: kikitan-translator-windows-setup
          path: KikitanTranslator.Photino\bin\Release\net9.0\win-x64\Release\com.github.yusufozmen01.kikitan-translator-win-Setup.exe
          if-no-files-found: error

      - name: Upload Windows release files (for combined zip)
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-files
          path: KikitanTranslator.Photino\bin\Release\net9.0\win-x64\Release\
          if-no-files-found: error

  package:
    name: Package Combined Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]

    steps:
      - name: Download Linux release files
        uses: actions/download-artifact@v4
        with:
          name: linux-release-files
          path: combined/linux

      - name: Download Windows release files
        uses: actions/download-artifact@v4
        with:
          name: windows-release-files
          path: combined/windows

      - name: Zip combined release
        run: zip -r kikitan-translator-all-platforms.zip combined/

      - name: Upload combined release zip
        uses: actions/upload-artifact@v4
        with:
          name: kikitan-translator-all-platforms
          path: kikitan-translator-all-platforms.zip
          if-no-files-found: error